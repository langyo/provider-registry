name: Auto-merge master into dev

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

concurrency:
  group: provider-merge-dev
  cancel-in-progress: false

jobs:
  merge-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Merge master into dev
        run: python3 scripts/merge_master_to_dev.py
