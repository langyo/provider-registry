# OpenAI Compatible - Responses API V1
# Custom OpenAI Responses API endpoint

[entrypoint]
id = "openai_compatible_responses_v1"
provider_id = "openai_compatible"
type = "custom"
billing_type = "one_time"

[entrypoint.name]
en = "OpenAI Responses V1 (Custom)"
zhs = "OpenAI Responses V1 (自定义)"
zht = "OpenAI Responses V1 (自訂)"
ja = "OpenAI Responses V1 (カスタム)"
ko = "OpenAI Responses V1 (사용자 지정)"
fr = "OpenAI Responses V1 (Personnalisé)"
es = "OpenAI Responses V1 (Personalizado)"
ru = "OpenAI Responses V1 (Пользовательский)"

[entrypoint.api]
protocol = "openai_responses_v1"
base_url = ""
chat_endpoint = "/responses"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "OPENAI_COMPATIBLE_API_KEY"

[entrypoint.defaults]
deep = "gpt-4o"
normal = "gpt-4o"
basic = "gpt-4o-mini"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "gpt-4o"
name = "GPT-4o"
context_window = 128000
max_output_tokens = 16384
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["flagship"]

[entrypoint.models.pricing]
input_per_million = 2.50
output_per_million = 10.0

[[entrypoint.models]]
id = "gpt-4o-mini"
name = "GPT-4o Mini"
context_window = 128000
max_output_tokens = 16384
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 0.15
output_per_million = 0.60
