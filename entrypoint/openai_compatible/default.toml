# OpenAI Compatible - Default
# Custom OpenAI-compatible API endpoint

[entrypoint]
id = "openai_compatible_default"
provider_id = "openai_compatible"
type = "custom"
billing_type = "one_time"

[entrypoint.name]
en = "OpenAI Compatible (Custom)"
zhs = "OpenAI 兼容 (自定义)"
zht = "OpenAI 相容 (自訂)"
ja = "OpenAI 互換 (カスタム)"
ko = "OpenAI 호환 (사용자 지정)"
fr = "Compatible OpenAI (Personnalisé)"
es = "OpenAI Compatible (Personalizado)"
ru = "OpenAI Совместимый (Пользовательский)"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = ""
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "OPENAI_COMPATIBLE_API_KEY"

[entrypoint.defaults]
deep = "gpt-4o"
normal = "gpt-4o"
basic = "gpt-4o-mini"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "gpt-4o"
name = "GPT-4o"
context_window = 128000
max_output_tokens = 16384
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["flagship"]

[entrypoint.models.pricing]
input_per_million = 2.50
output_per_million = 10.0

[[entrypoint.models]]
id = "gpt-4o-mini"
name = "GPT-4o Mini"
context_window = 128000
max_output_tokens = 16384
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 0.15
output_per_million = 0.60
