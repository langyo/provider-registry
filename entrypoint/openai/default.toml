# OpenAI (Official)

[entrypoint]
id = "openai_default"
provider_id = "openai"
website_domain = "openai.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.openai.com/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "OPENAI_API_KEY"

[entrypoint.name]
en = "OpenAI (Official)"
zhs = "OpenAI（官方）"
zht = "OpenAI（官方）"
ja = "OpenAI（公式）"
ko = "OpenAI（공식）"
fr = "OpenAI (Officiel)"
es = "OpenAI (Oficial)"
ru = "OpenAI (Официальный)"

[entrypoint.defaults]
deep = "gpt-5.4-pro"
normal = "dall-e-3"
basic = "gpt-5.4-mini"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

