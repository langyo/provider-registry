# xAI Grok (Official)

[entrypoint]
id = "xai_default"
provider_id = "xai"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.x.ai/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "XAI_API_KEY"

[entrypoint.name]
en = "xAI Grok (Official)"
zhs = "xAI Grok（官方）"
zht = "xAI Grok（官方）"
ja = "xAI Grok（公式）"
ko = "xAI Grok（공식）"
fr = "xAI Grok (Officiel)"
es = "xAI Grok (Oficial)"
ru = "xAI Grok (Официальный)"

[entrypoint.defaults]
deep = "grok-4.20-0309-reasoning"
normal = "grok-3-mini-beta"
basic = "grok-3-mini"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

