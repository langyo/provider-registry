# Google Gemini (Official)

[entrypoint]
id = "google_default"
provider_id = "google"
website_domain = "google.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "gemini_generate_v1"
base_url = "https://generativelanguage.googleapis.com/v1beta"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "GOOGLE_API_KEY"

[entrypoint.name]
en = "Google Gemini (Official)"
zhs = "Google Gemini（官方）"
zht = "Google Gemini（官方）"
ja = "Google Gemini（公式）"
ko = "Google Gemini（공식）"
fr = "Google Gemini (Officiel)"
es = "Google Gemini (Oficial)"
ru = "Google Gemini (Официальный)"

[entrypoint.defaults]
deep = "gemma-4-31b-it"
normal = "gemini-3.1-flash-lite"
basic = "gemini-2.5-flash"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

