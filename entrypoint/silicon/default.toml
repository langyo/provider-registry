# SiliconFlow (China)

[entrypoint]
id = "silicon_default"
provider_id = "silicon"
website_domain = "siliconflow.cn"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.siliconflow.cn/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "SILICON_API_KEY"

[entrypoint.name]
en = "SiliconFlow (China)"
zhs = "硅基流动（国内版）"
zht = "硅基流動（國內版）"
ja = "SiliconFlow（中国）"
ko = "SiliconFlow（중국）"
fr = "SiliconFlow (Chine)"
es = "SiliconFlow (China)"
ru = "SiliconFlow (Китай)"

[entrypoint.defaults]
deep = "zai-org/GLM-5.2"
normal = "Pro/zai-org/GLM-5.1"
basic = "stepfun-ai/Step-3.5-Flash"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

