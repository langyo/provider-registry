# OpenRouter (Multi-Provider)

[entrypoint]
id = "openrouter_default"
provider_id = "openrouter"
website_domain = "openrouter.ai"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://openrouter.ai/api/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "OPENROUTER_API_KEY"

[entrypoint.name]
en = "OpenRouter (Multi-Provider)"
zhs = "OpenRouter（多提供商）"
zht = "OpenRouter（多提供商）"
ja = "OpenRouter（マルチプロバイダー）"
ko = "OpenRouter（멀티 제공자）"
fr = "OpenRouter (Multi-fournisseurs)"
es = "OpenRouter (Multiproveedor)"
ru = "OpenRouter (Мульти-провайдер)"

[entrypoint.defaults]
deep = "z-ai/glm-5.2"
normal = "z-ai/glm-5.1"
basic = "openai/gpt-5.4-mini"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

