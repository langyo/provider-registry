# Qwen (China One-time) - Anthropic

[entrypoint]
id = "qwen_default_anthropic"
provider_id = "qwen"
website_domain = "alibaba.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "anthropic_messages_v1"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
chat_endpoint = "/v1/messages"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "DASHSCOPE_API_KEY"

[entrypoint.name]
en = "Qwen (China One-time) (Anthropic)"
zhs = "通义千问（国内版一次性计费）（Anthropic）"
zht = "通義千問（國內版一次性計費）（Anthropic）"
ja = "Qwen（中国一回限り）（Anthropic）"
ko = "Qwen（중국 일시불）（Anthropic）"
fr = "Qwen (Chine Paiement unique) (Anthropic)"
es = "Qwen (China Pago único) (Anthropic)"
ru = "Qwen (Китай Разовая оплата) (Anthropic)"

[entrypoint.defaults]
deep = "qwen3.5-397b-a17b"
normal = "qwen3.5-122b-a10b"
basic = "qwen3.5-flash-02-23"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

