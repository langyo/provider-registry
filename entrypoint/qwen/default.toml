# Qwen (China One-time)

[entrypoint]
id = "qwen_default"
provider_id = "qwen"
website_domain = "alibaba.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "DASHSCOPE_API_KEY"

[entrypoint.name]
en = "Qwen (China One-time)"
zhs = "通义千问（国内版一次性计费）"
zht = "通義千問（國內版一次性計費）"
ja = "Qwen（中国一回限り）"
ko = "Qwen（중국 일시불）"
fr = "Qwen (Chine Paiement unique)"
es = "Qwen (China Pago único)"
ru = "Qwen (Китай Разовая оплата)"

[entrypoint.defaults]
deep = "glm-5.1"
normal = "glm-5"
basic = "MiniMax/MiniMax-M2.7"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

