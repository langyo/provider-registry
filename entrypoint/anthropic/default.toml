# Anthropic (Official)

[entrypoint]
id = "anthropic_default"
provider_id = "anthropic"
website_domain = "anthropic.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "anthropic_messages_v1"
base_url = "https://api.anthropic.com/v1"
chat_endpoint = "/messages"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "x-api-key"
env_var = "ANTHROPIC_API_KEY"

[entrypoint.name]
en = "Anthropic (Official)"
zhs = "Anthropic（官方）"
zht = "Anthropic（官方）"
ja = "Anthropic（公式）"
ko = "Anthropic（공식）"
fr = "Anthropic (Officiel)"
es = "Anthropic (Oficial)"
ru = "Anthropic (Официальный)"

[entrypoint.defaults]
deep = "claude-fable-5"
normal = "claude-opus-4-20250514"
basic = "claude-3.5-haiku"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

