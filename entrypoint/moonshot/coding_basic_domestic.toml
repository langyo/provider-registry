# Moonshot - Coding Plan Basic (Domestic)
# 月之暗面国内版编程套餐 Basic - 周期计费

[entrypoint]
id = "moonshot_coding_basic_domestic"
provider_id = "moonshot"
type = "coding_plan"
billing_type = "periodic"
plan_tier = "basic"

# Display names in all supported languages
[entrypoint.name]
en = "Moonshot China Coding Plan Basic"
zhs = "月之暗面国内版编程套餐 Basic"
zht = "月之暗面國內版編程套餐 Basic"
ja = "Moonshot 中国コーディングプラン Basic"
ko = "Moonshot 중국 코딩 플랜 Basic"
fr = "Moonshot Chine Plan Coding Basic"
es = "Moonshot China Plan Coding Basic"
ru = "Moonshot Китай План Coding Basic"

# API Configuration
[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.moonshot.cn/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "MOONSHOT_API_KEY_CODING_BASIC"

# Default models for each tier
[entrypoint.defaults]
deep = "moonshot-v1-128k"
normal = "moonshot-v1-32k"
basic = "moonshot-v1-8k"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

# Quota configuration for periodic billing
# Official: 1,024 prompts per week for basic plan
[[entrypoint.quota]]
data_limit = 1024
period_days = 7
billing_metric = "prompt_times"

# Available models with pricing
[[entrypoint.models]]
id = "moonshot-v1-128k"
name = "Moonshot v1 128k"
context_window = 128000
max_output_tokens = 4096
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["flagship"]

[entrypoint.models.pricing]
input_per_million = 12.0
output_per_million = 12.0

[[entrypoint.models]]
id = "moonshot-v1-32k"
name = "Moonshot v1 32k"
context_window = 32000
max_output_tokens = 4096
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = []

[entrypoint.models.pricing]
input_per_million = 12.0
output_per_million = 12.0

[[entrypoint.models]]
id = "moonshot-v1-8k"
name = "Moonshot v1 8k"
context_window = 8000
max_output_tokens = 4096
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 12.0
output_per_million = 12.0
