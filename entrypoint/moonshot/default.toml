# Moonshot (China One-time)

[entrypoint]
id = "moonshot_default"
provider_id = "moonshot"
website_domain = "moonshot.cn"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.moonshot.cn/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "MOONSHOT_API_KEY"

[entrypoint.name]
en = "Moonshot (China One-time)"
zhs = "月之暗面（国内版一次性计费）"
zht = "月之暗面（國內版一次性計費）"
ja = "Moonshot（中国一回限り）"
ko = "Moonshot（중국 일시불）"
fr = "Moonshot (Chine Paiement unique)"
es = "Moonshot (China Pago único)"
ru = "Moonshot (Китай Разовая оплата)"

[entrypoint.defaults]
deep = "kimi-k2.6"
normal = "kimi-k2.5"
basic = "kimi-k2-thinking-turbo"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "kimi-k2-thinking-turbo"

[entrypoint.models.pricing]
input_per_million = 1.15
output_per_million = 8.0
cached_per_million = 0.15

[[entrypoint.models]]
id = "kimi-k2.6"

[entrypoint.models.pricing]
