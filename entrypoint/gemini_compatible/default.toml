# Gemini Compatible - Default
# Custom Google Gemini-compatible API endpoint

[entrypoint]
id = "gemini_compatible_default"
provider_id = "gemini_compatible"
type = "custom"
billing_type = "one_time"

[entrypoint.name]
en = "Gemini Compatible (Custom)"
zhs = "Gemini 兼容 (自定义)"
zht = "Gemini 相容 (自訂)"
ja = "Gemini 互換 (カスタム)"
ko = "Gemini 호환 (사용자 지정)"
fr = "Compatible Gemini (Personnalisé)"
es = "Gemini Compatible (Personalizado)"
ru = "Gemini Совместимый (Пользовательский)"

[entrypoint.api]
protocol = "gemini_generate_v1"
base_url = ""
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "GEMINI_COMPATIBLE_API_KEY"

[entrypoint.defaults]
deep = "gemini-2.5-pro"
normal = "gemini-2.5-flash"
basic = "gemini-2.5-flash-lite"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "gemini-2.5-pro"
name = "Gemini 2.5 Pro"
context_window = 1048576
max_output_tokens = 65536
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = true
tags = ["flagship"]

[entrypoint.models.pricing]
input_per_million = 1.25
output_per_million = 10.0
cached_per_million = 0.125

[[entrypoint.models]]
id = "gemini-2.5-flash"
name = "Gemini 2.5 Flash"
context_window = 1048576
max_output_tokens = 65536
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = true
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 0.3
output_per_million = 2.5
cached_per_million = 0.03

[[entrypoint.models]]
id = "gemini-2.5-flash-lite"
name = "Gemini 2.5 Flash-Lite"
context_window = 1048576
max_output_tokens = 65536
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 0.1
output_per_million = 0.4
cached_per_million = 0.01
