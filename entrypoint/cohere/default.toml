# Cohere (Official)

[entrypoint]
id = "cohere_default"
provider_id = "cohere"
website_domain = "cohere.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.cohere.ai/v2"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "COHERE_API_KEY"

[entrypoint.name]
en = "Cohere (Official)"
zhs = "Cohere（官方）"
zht = "Cohere（官方）"
ja = "Cohere（公式）"
ko = "Cohere（공식）"
fr = "Cohere (Officiel)"
es = "Cohere (Oficial)"
ru = "Cohere (Официальный)"

[entrypoint.defaults]
deep = "command-a-reasoning-08-2025"
normal = "command-a-translate-08-2025"
basic = "command-a-03-2025"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

