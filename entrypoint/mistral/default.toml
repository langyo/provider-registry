# Mistral AI (Official)

[entrypoint]
id = "mistral_default"
provider_id = "mistral"
website_domain = "mistral.ai"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.mistral.ai/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "MISTRAL_API_KEY"

[entrypoint.name]
en = "Mistral AI (Official)"
zhs = "Mistral AI（官方）"
zht = "Mistral AI（官方）"
ja = "Mistral AI（公式）"
ko = "Mistral AI（공식）"
fr = "Mistral AI (Officiel)"
es = "Mistral AI (Oficial)"
ru = "Mistral AI (Официальный)"

[entrypoint.defaults]
deep = "magistral-medium-latest"
normal = "ministral-3b-latest"
basic = "ministral-8b-latest"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

