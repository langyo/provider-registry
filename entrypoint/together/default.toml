# Together AI

[entrypoint]
id = "together_default"
provider_id = "together"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.together.xyz/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "TOGETHER_API_KEY"

[entrypoint.name]
en = "Together AI"
zhs = "Together AI"
zht = "Together AI"
ja = "Together AI"
ko = "Together AI"
fr = "Together AI"
es = "Together AI"
ru = "Together AI"

[entrypoint.defaults]
deep = "zai-org/GLM-5.1"
normal = "MiniMaxAI/MiniMax-M2.5"
basic = "MiniMaxAI/MiniMax-M2.7"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

