# MiniMax (China)

[entrypoint]
id = "minimax_default"
provider_id = "minimax"
website_domain = "minimax.chat"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.minimax.chat/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "MINIMAX_API_KEY"

[entrypoint.name]
en = "MiniMax (China)"
zhs = "MiniMax（国内版）"
zht = "MiniMax（國內版）"
ja = "MiniMax（中国）"
ko = "MiniMax（중국）"
fr = "MiniMax (Chine)"
es = "MiniMax (China)"
ru = "MiniMax (Китай)"

[entrypoint.defaults]
deep = "MiniMax-M2.7-highspeed"
normal = "MiniMax-M2.7"
basic = "MiniMax-M2.5-highspeed"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

