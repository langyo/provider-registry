# MiniMax (China) - Anthropic

[entrypoint]
id = "minimax_default_anthropic"
provider_id = "minimax"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "anthropic_messages_v1"
base_url = "https://api.minimax.chat/v1"
chat_endpoint = "/v1/messages"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "MINIMAX_API_KEY"

[entrypoint.name]
en = "MiniMax (China) (Anthropic)"
zhs = "MiniMax（国内版）（Anthropic）"
zht = "MiniMax（國內版）（Anthropic）"
ja = "MiniMax（中国）（Anthropic）"
ko = "MiniMax（중국）（Anthropic）"
fr = "MiniMax (Chine) (Anthropic)"
es = "MiniMax (China) (Anthropic)"
ru = "MiniMax (Китай) (Anthropic)"

[entrypoint.defaults]
deep = "minimax-m2.7"
normal = "minimax-m2.5"
basic = "minimax-01"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "minimax-m1"

[entrypoint.models.pricing]
input_per_million = 0.4
output_per_million = 2.2

