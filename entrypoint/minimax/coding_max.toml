# MiniMax - Coding Plan Max
# MiniMax AI (China) - Coding Plan Max

[entrypoint]
id = "minimax_coding_max"
provider_id = "minimax"
type = "coding_plan"
billing_type = "periodic"
plan_tier = "max"

[entrypoint.name]
en = "MiniMax Coding Plan Max"
zhs = "MiniMax 编程套餐 Max"
zht = "MiniMax 編程套餐 Max"
ja = "MiniMax コーディングプラン Max"
ko = "MiniMax 코딩 플랜 Max"
fr = "MiniMax Plan Coding Max"
es = "MiniMax Plan Coding Max"
ru = "MiniMax План Coding Max"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.minimax.chat/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "MINIMAX_API_KEY_CODING_MAX"

[entrypoint.defaults]
deep = "minimax-m2.7"
normal = "minimax-m2.5"
basic = "minimax-01"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

# Quota configuration for periodic billing
# MiniMax has only 5-hour rolling limit, no weekly limit
[[entrypoint.quota]]
data_limit = 300
period_hours = 5
billing_metric = "prompt_times"

[[entrypoint.models]]
id = "minimax-m2.7"
name = "MiniMax M2.7"
context_window = 204800
max_output_tokens = 16384
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["flagship"]

[entrypoint.models.pricing]
input_per_million = 0.3
output_per_million = 1.2
cached_per_million = 0.06

[[entrypoint.models]]
id = "minimax-m2.5"
name = "MiniMax M2.5"
context_window = 196608
max_output_tokens = 16384
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 0.2
output_per_million = 1.17
cached_per_million = 0.1

[[entrypoint.models]]
id = "minimax-01"
name = "MiniMax-01"
context_window = 1000192
max_output_tokens = 16384
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["vision"]

[entrypoint.models.pricing]
input_per_million = 0.2
output_per_million = 1.1
