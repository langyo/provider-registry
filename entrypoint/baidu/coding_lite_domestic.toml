# Baidu Wenxin - Coding Plan Lite (Domestic)
# 百度文心国内版编程套餐 Lite - 周期计费

[entrypoint]
id = "baidu_coding_lite_domestic"
provider_id = "baidu"
type = "coding_plan"
billing_type = "periodic"
plan_tier = "lite"

# Display names in all supported languages
[entrypoint.name]
en = "Baidu China Coding Plan Lite"
zhs = "百度文心国内版编程套餐 Lite"
zht = "百度文心國內版編程套餐 Lite"
ja = "Baidu 中国コーディングプラン Lite"
ko = "Baidu 중국 코딩 플랜 Lite"
fr = "Baidu Chine Plan Coding Lite"
es = "Baidu China Plan Coding Lite"
ru = "Baidu Китай План Coding Lite"

# API Configuration
[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "BAIDU_API_KEY_CODING_LITE"

# Default models for each tier
[entrypoint.defaults]
deep = "ernie-4.0-8k"
normal = "ernie-3.5-8k"
basic = "ernie-3.5-8k"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

# Quota configuration for periodic billing
# Official: 1,200 prompts per 5 hours, 9,000 per week, 18,000 per month
[[entrypoint.quota]]
data_limit = 1200
period_hours = 5
billing_metric = "prompt_times"

[[entrypoint.quota]]
data_limit = 9000
period_days = 7
billing_metric = "prompt_times"

[[entrypoint.quota]]
data_limit = 18000
period_days = 30
billing_metric = "prompt_times"

# Available models with pricing
[[entrypoint.models]]
id = "ernie-4.0-8k"
name = "ERNIE 4.0 8K"
context_window = 8192
max_output_tokens = 2048
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["flagship"]

[entrypoint.models.pricing]
input_per_million = 12.0
output_per_million = 12.0

[[entrypoint.models]]
id = "ernie-3.5-8k"
name = "ERNIE 3.5 8K"
context_window = 8192
max_output_tokens = 2048
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 3.0
output_per_million = 3.0
