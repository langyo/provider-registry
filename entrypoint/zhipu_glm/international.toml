# GLM International (One-time)

[entrypoint]
id = "zhipu_glm_international"
provider_id = "zhipu_glm"
website_domain = "z.ai"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.z.ai/api/paas/v4"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "ZAI_API_KEY"

[entrypoint.name]
en = "GLM International (One-time)"
zhs = "智谱 GLM 国际版（一次性计费）"
zht = "智譜 GLM 國際版（一次性計費）"
ja = "GLM 国際（一回限り）"
ko = "GLM 국제（일시불）"
fr = "GLM International (Paiement unique)"
es = "GLM Internacional (Pago único)"
ru = "GLM Международный (Разовая оплата)"

[entrypoint.defaults]
deep = "glm-5.2"
normal = "glm-5"
basic = "glm-5v-turbo"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

