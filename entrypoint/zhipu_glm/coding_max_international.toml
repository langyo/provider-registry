# GLM International Coding Plan Max

[entrypoint]
id = "zhipu_glm_coding_max_international"
provider_id = "zhipu_glm"
website_domain = "z.ai"
type = "coding_plan"
billing_type = "periodic"
plan_tier = "max"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.z.ai/api/coding/paas/v4"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "ZAI_API_KEY_CODING_MAX"

[entrypoint.name]
en = "GLM International Coding Plan Max"
zhs = "智谱 GLM 国际版编程套餐 Max"
zht = "智譜 GLM 國際版編程套餐 Max"
ja = "GLM 国際コーディングプラン Max"
ko = "GLM 국제 코딩 플랜 Max"
fr = "GLM International Plan Coding Max"
es = "GLM Internacional Plan Coding Max"
ru = "GLM Международный План Coding Max"

[entrypoint.defaults]
deep = "glm-5.2"
normal = "glm-5"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "glm-5.2"

[entrypoint.models.pricing]
input_per_million = 1.0
output_per_million = 4.0
cached_per_million = 0.18

[[entrypoint.models]]
id = "glm-5"

[entrypoint.models.pricing]
input_per_million = 1.0
output_per_million = 3.2
cached_per_million = 0.2
