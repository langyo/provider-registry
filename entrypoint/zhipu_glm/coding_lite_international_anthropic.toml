# GLM International Coding Plan Lite - Anthropic

[entrypoint]
id = "zhipu_glm_coding_lite_international_anthropic"
provider_id = "zhipu_glm"
website_domain = "zhipuai.cn"
type = "coding_plan"
billing_type = "periodic"
plan_tier = "lite"

[entrypoint.api]
protocol = "anthropic_messages_v1"
base_url = "https://api.z.ai/api/coding/paas/v4"
chat_endpoint = "/v1/messages"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "ZAI_API_KEY_CODING_LITE"

[entrypoint.name]
en = "GLM International Coding Plan Lite (Anthropic)"
zhs = "智谱 GLM 国际版编程套餐 Lite（Anthropic）"
zht = "智譜 GLM 國際版編程套餐 Lite（Anthropic）"
ja = "GLM 国際コーディングプラン Lite（Anthropic）"
ko = "GLM 국제 코딩 플랜 Lite（Anthropic）"
fr = "GLM International Plan Coding Lite (Anthropic)"
es = "GLM Internacional Plan Coding Lite (Anthropic)"
ru = "GLM Международный План Coding Lite (Anthropic)"

[entrypoint.defaults]
deep = ["glm-5.1", "glm-5v-turbo"]
normal = ["glm-5", "glm-5v-turbo"]
basic = "glm-4.7-flash"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.quota]]
data_limit = 80
period_hours = 5
billing_metric = "prompt_times"

[[entrypoint.quota]]
data_limit = 400
period_days = 7
billing_metric = "prompt_times"

[[entrypoint.models]]
id = "glm-5.1"

[[entrypoint.models]]
id = "glm-5-turbo"

[entrypoint.models.pricing]
input_per_million = 1.2
output_per_million = 4.0
cached_per_million = 0.24


[[entrypoint.models]]
id = "glm-5v-turbo"
[[entrypoint.models]]
id = "glm-5"

[entrypoint.models.pricing]
input_per_million = 0.72
output_per_million = 2.3

[[entrypoint.models]]
id = "glm-4.7"

[entrypoint.models.pricing]
input_per_million = 0.39
output_per_million = 1.75
cached_per_million = 0.195

[[entrypoint.models]]
id = "glm-4.7-flash"

[entrypoint.models.pricing]
input_per_million = 0.06
output_per_million = 0.4
cached_per_million = 0.01
