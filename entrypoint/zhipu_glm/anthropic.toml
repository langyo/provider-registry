# GLM China (One-time) - Anthropic

[entrypoint]
id = "zhipu_glm_default_anthropic"
provider_id = "zhipu_glm"
website_domain = "zhipu.ai"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "anthropic_messages_v1"
base_url = "https://open.bigmodel.cn/api/paas/v4"
chat_endpoint = "/v1/messages"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "BIGMODEL_API_KEY"

[entrypoint.name]
en = "GLM China (One-time) (Anthropic)"
zhs = "智谱 GLM 国内版（一次性计费）（Anthropic）"
zht = "智譜 GLM 國內版（一次性計費）（Anthropic）"
ja = "GLM 中国（一回限り）（Anthropic）"
ko = "GLM 중국（일시불）（Anthropic）"
fr = "GLM Chine (Paiement unique) (Anthropic)"
es = "GLM China (Pago único) (Anthropic)"
ru = "GLM Китай (Разовая оплата) (Anthropic)"

[entrypoint.defaults]
deep = ["glm-5v-turbo"]
normal = ["glm-5", "glm-5v-turbo"]
basic = "glm-4.7-flash"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

