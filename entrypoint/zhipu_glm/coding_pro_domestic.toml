# GLM China Coding Plan Pro

[entrypoint]
id = "zhipu_glm_coding_pro_domestic"
provider_id = "zhipu_glm"
website_domain = "zhipuai.cn"
type = "coding_plan"
billing_type = "periodic"
plan_tier = "pro"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://open.bigmodel.cn/api/coding/paas/v4"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "BIGMODEL_API_KEY_CODING_PRO"

[entrypoint.name]
en = "GLM China Coding Plan Pro"
zhs = "智谱 GLM 国内版编程套餐 Pro"
zht = "智譜 GLM 國內版編程套餐 Pro"
ja = "GLM 中国コーディングプラン Pro"
ko = "GLM 중국 코딩 플랜 Pro"
fr = "GLM Chine Plan Coding Pro"
es = "GLM China Plan Coding Pro"
ru = "GLM Китай План Coding Pro"

[entrypoint.defaults]
deep = "glm-5.2"
normal = "glm-5"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "glm-5.2"

[entrypoint.models.pricing]
input_per_million = 1.4
output_per_million = 4.4
cached_per_million = 0.26

[[entrypoint.models]]
id = "glm-5"

[entrypoint.models.pricing]
input_per_million = 1.0
output_per_million = 3.2
cached_per_million = 0.2
