# GLM China (One-time)

[entrypoint]
id = "zhipu_glm_default"
provider_id = "zhipu_glm"
website_domain = "zhipuai.cn"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://open.bigmodel.cn/api/paas/v4"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "BIGMODEL_API_KEY"

[entrypoint.name]
en = "GLM China (One-time)"
zhs = "智谱 GLM 国内版（一次性计费）"
zht = "智譜 GLM 國內版（一次性計費）"
ja = "GLM 中国（一回限り）"
ko = "GLM 중국（일시불）"
fr = "GLM Chine (Paiement unique)"
es = "GLM China (Pago único)"
ru = "GLM Китай (Разовая оплата)"

[entrypoint.defaults]
deep = "glm-5.1"
normal = "glm-5-turbo"
basic = "glm-5v-turbo"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

