# GLM China Coding Plan Max

[entrypoint]
id = "zhipu_glm_coding_max_domestic"
provider_id = "zhipu_glm"
website_domain = "zhipuai.cn"
type = "coding_plan"
billing_type = "periodic"
plan_tier = "max"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://open.bigmodel.cn/api/coding/paas/v4"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "BIGMODEL_API_KEY_CODING_MAX"

[entrypoint.name]
en = "GLM China Coding Plan Max"
zhs = "智谱 GLM 国内版编程套餐 Max"
zht = "智譜 GLM 國內版編程套餐 Max"
ja = "GLM 中国コーディングプラン Max"
ko = "GLM 중국 코딩 플랜 Max"
fr = "GLM Chine Plan Coding Max"
es = "GLM China Plan Coding Max"
ru = "GLM Китай План Coding Max"

[entrypoint.defaults]
deep = "glm-5.1"
normal = "glm-5-turbo"
basic = "glm-5v-turbo"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "glm-5.1"

[entrypoint.models.pricing]
input_per_million = 6.0
output_per_million = 24.0
cached_per_million = 1.3

[[entrypoint.models]]
id = "glm-5-turbo"

[[entrypoint.models]]
id = "glm-5v-turbo"

[entrypoint.models.pricing]
input_per_million = 5.0
output_per_million = 22.0
cached_per_million = 1.2
