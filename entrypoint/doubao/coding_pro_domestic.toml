# Doubao - Coding Plan Pro (Domestic)
# 豆包国内版编程套餐 Pro - 周期计费

[entrypoint]
id = "doubao_coding_pro_domestic"
provider_id = "doubao"
website_domain = "volcengine.com"
type = "coding_plan"
billing_type = "periodic"
plan_tier = "pro"

# Display names in all supported languages
[entrypoint.name]
en = "Doubao China Coding Plan Pro"
zhs = "豆包国内版编程套餐 Pro"
zht = "豆包國內版編程套餐 Pro"
ja = "Doubao 中国コーディングプラン Pro"
ko = "Doubao 중국 코딩 플랜 Pro"
fr = "Doubao Chine Plan Coding Pro"
es = "Doubao China Plan Coding Pro"
ru = "Doubao Китай План Coding Pro"

# API Configuration
[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://ark.cn-beijing.volces.com/api/v3"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "DOUBAO_API_KEY_CODING_PRO"

# Default models for each tier
[entrypoint.defaults]
deep = "doubao-pro-32k"
normal = "doubao-pro-32k"
basic = "doubao-lite-4k"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

# Quota configuration for periodic billing
# Official: 6,000 prompts per 5 hours, 45,000 per week, 90,000 per month
[[entrypoint.quota]]
data_limit = 6000
period_hours = 5
billing_metric = "prompt_times"

[[entrypoint.quota]]
data_limit = 45000
period_days = 7
billing_metric = "prompt_times"

[[entrypoint.quota]]
data_limit = 90000
period_days = 30
billing_metric = "prompt_times"

# Available models with pricing
[[entrypoint.models]]
id = "doubao-pro-32k"
name = "Doubao Pro 32K"
context_window = 32768
max_output_tokens = 4096
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["flagship"]

[entrypoint.models.pricing]
input_per_million = 1.0
output_per_million = 1.0

[[entrypoint.models]]
id = "doubao-lite-4k"
name = "Doubao Lite 4K"
context_window = 4096
max_output_tokens = 4096
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 0.1
output_per_million = 0.1
