# Doubao - Default
# ByteDance Doubao (China)

[entrypoint]
id = "doubao_default"
provider_id = "doubao"
website_domain = "volcengine.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.name]
en = "Doubao (ByteDance)"
zhs = "豆包（字节跳动）"
zht = "豆包（字節跳動）"
ja = "Doubao (ByteDance)"
ko = "Doubao (ByteDance)"
fr = "Doubao (ByteDance)"
es = "Doubao (ByteDance)"
ru = "Doubao (ByteDance)"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://ark.cn-beijing.volces.com/api/v3"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "DOUBAO_API_KEY"

[entrypoint.defaults]
deep = "doubao-pro-32k"
normal = "doubao-pro-32k"
basic = "doubao-lite-4k"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "doubao-pro-32k"
name = "Doubao Pro 32K"
context_window = 32768
max_output_tokens = 4096
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["flagship"]

[entrypoint.models.pricing]
input_per_million = 1.0
output_per_million = 1.0

[[entrypoint.models]]
id = "doubao-lite-4k"
name = "Doubao Lite 4K"
context_window = 4096
max_output_tokens = 4096
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["cost_effective"]

[entrypoint.models.pricing]
input_per_million = 0.1
output_per_million = 0.1
