# DeepSeek (Official)

[entrypoint]
id = "deepseek_default"
provider_id = "deepseek"
website_domain = "deepseek.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.deepseek.com/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "DEEPSEEK_API_KEY"

[entrypoint.name]
en = "DeepSeek (Official)"
zhs = "DeepSeek（官方）"
zht = "DeepSeek（官方）"
ja = "DeepSeek（公式）"
ko = "DeepSeek（공식）"
fr = "DeepSeek (Officiel)"
es = "DeepSeek (Oficial)"
ru = "DeepSeek (Официальный)"

[entrypoint.defaults]
deep = "deepseek-reasoner"
normal = "deepseek-v4-pro"
basic = "deepseek-v4-flash"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

