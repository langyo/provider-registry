# DeepSeek (Official) - Anthropic

[entrypoint]
id = "deepseek_default_anthropic"
provider_id = "deepseek"
website_domain = "deepseek.com"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "anthropic_messages_v1"
base_url = "https://api.deepseek.com"
chat_endpoint = "/v1/messages"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "DEEPSEEK_API_KEY"

[entrypoint.name]
en = "DeepSeek (Official) (Anthropic)"
zhs = "DeepSeek（官方）（Anthropic）"
zht = "DeepSeek（官方）（Anthropic）"
ja = "DeepSeek（公式）（Anthropic）"
ko = "DeepSeek（공식）（Anthropic）"
fr = "DeepSeek (Officiel) (Anthropic)"
es = "DeepSeek (Oficial) (Anthropic)"
ru = "DeepSeek (Официальный) (Anthropic)"

[entrypoint.defaults]
deep = "deepseek-r1"
normal = "deepseek-chat"
basic = "deepseek-chat"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

