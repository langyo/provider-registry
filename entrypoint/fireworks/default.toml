# Fireworks AI

[entrypoint]
id = "fireworks_default"
provider_id = "fireworks"
website_domain = "fireworks.ai"
type = "one_time"
billing_type = "one_time"

[entrypoint.api]
protocol = "openai_chat_v1"
base_url = "https://api.fireworks.ai/inference/v1"
chat_endpoint = "/chat/completions"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "FIREWORKS_API_KEY"

[entrypoint.name]
en = "Fireworks AI"
zhs = "Fireworks AI"
zht = "Fireworks AI"
ja = "Fireworks AI"
ko = "Fireworks AI"
fr = "Fireworks AI"
es = "Fireworks AI"
ru = "Fireworks AI"

[entrypoint.defaults]
deep = "accounts/fireworks/routers/glm-5p1-fast"
normal = "accounts/fireworks/models/glm-5p1"
basic = "accounts/fireworks/models/minimax-m3"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

