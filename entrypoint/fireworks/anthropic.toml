# Fireworks AI - Default - Anthropic

[entrypoint]
id = "fireworks_default_anthropic"
provider_id = "fireworks"
type = "one_time"
billing_type = "one_time"

[entrypoint.name]
en = "Fireworks AI (Anthropic)"
zhs = "Fireworks AI（Anthropic）"
zht = "Fireworks AI（Anthropic）"
ja = "Fireworks AI（Anthropic）"
ko = "Fireworks AI（Anthropic）"
fr = "Fireworks AI (Anthropic)"
es = "Fireworks AI (Anthropic)"
ru = "Fireworks AI (Anthropic)"

[entrypoint.api]
protocol = "anthropic_messages_v1"
base_url = "https://api.fireworks.ai/inference/v1"
chat_endpoint = "/v1/messages"
models_endpoint = "/models"
auth_type = "bearer"
auth_header = "Authorization"
env_var = "FIREWORKS_API_KEY"

[entrypoint.defaults]
deep = "accounts/fireworks/models/llama-v3p3-70b-instruct"
normal = "accounts/fireworks/models/qwen2p5-72b-instruct"
basic = "accounts/fireworks/models/llama4-maverick-instruct-basic"

[entrypoint.defaults.max_concurrent]
deep = 1
normal = 1
basic = 2

[[entrypoint.models]]
id = "accounts/fireworks/models/llama-v3p3-70b-instruct"
name = "Llama 3.3 70B"
context_window = 131072
max_output_tokens = 16384
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["flagship", "fast"]

[entrypoint.models.pricing]
input_per_million = 0.2
output_per_million = 0.2

[[entrypoint.models]]
id = "accounts/fireworks/models/qwen2p5-72b-instruct"
name = "Qwen 2.5 72B"
context_window = 32768
max_output_tokens = 8192
supports_vision = false
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = []

[entrypoint.models.pricing]
input_per_million = 0.3
output_per_million = 0.3

[[entrypoint.models]]
id = "accounts/fireworks/models/llama4-maverick-instruct-basic"
name = "Llama 4 Maverick"
context_window = 131072
max_output_tokens = 16384
supports_vision = true
supports_function_calling = true
supports_streaming = true
supports_reasoning = false
tags = ["vision"]

[entrypoint.models.pricing]
input_per_million = 0.2
output_per_million = 0.2
